# MQI Interpreter Runtime Configuration File

processing:
  # Dose dividing factor for particle count calculation
  dose_dividing_factor: 10

  # Calibration mode settings for custom RT plans.
  # These values are loaded at runtime but are not yet applied elsewhere.
  calibration_mode:
    enabled: false
    use_correction_factors: true
    multi_energy_layer: false

logging:
  # Log level: DEBUG, INFO, WARNING, ERROR
  level: INFO

  # Show progress bars
  show_progress: true
